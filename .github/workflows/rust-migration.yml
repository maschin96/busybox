name: Rust migration

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

jobs:
  busybox-default:
    name: BusyBox default config
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build default BusyBox
        run: |
          make allnoconfig
          python3 - <<'PY'
          from pathlib import Path

          config = Path(".config")
          text = config.read_text()

          def set_bool(name, value):
              disabled = f"# CONFIG_{name} is not set"
              enabled = f"CONFIG_{name}=y"
              if value:
                  if disabled in text:
                      return text.replace(disabled, enabled)
                  if enabled in text:
                      return text
              else:
                  if enabled in text:
                      return text.replace(enabled, disabled)
                  if disabled in text:
                      return text
              raise SystemExit(f"CONFIG_{name} not found")

          for symbol in ["BUSYBOX", "TRUE", "FALSE"]:
              text = set_bool(symbol, True)
          config.write_text(text)
          PY
          yes "" | make oldconfig
          make busybox

      - name: Smoke test default BusyBox
        run: |
          ./busybox true
          if ./busybox false; then
            echo "false returned success"
            exit 1
          fi

  rust-crate:
    name: Rust crate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.79.0 --profile minimal --component rustfmt --component clippy

      - name: Check Rust formatting
        run: cargo +1.79.0 fmt --manifest-path rust/Cargo.toml -- --check

      - name: Lint Rust crate
        run: cargo +1.79.0 clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Build Rust crate
        run: cargo +1.79.0 build --manifest-path rust/Cargo.toml --release

  busybox-rust-applets:
    name: BusyBox with Rust applets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.79.0 --profile minimal

      - name: Enable Rust applets
        run: |
          make allnoconfig
          python3 - <<'PY'
          from pathlib import Path

          config = Path(".config")
          text = config.read_text()

          def set_bool(name, value):
              disabled = f"# CONFIG_{name} is not set"
              enabled = f"CONFIG_{name}=y"
              if value:
                  if disabled in text:
                      return text.replace(disabled, enabled)
                  if enabled in text:
                      return text
              else:
                  if enabled in text:
                      return text.replace(enabled, disabled)
                  if disabled in text:
                      return text
              raise SystemExit(f"CONFIG_{name} not found")

          for symbol in ["BUSYBOX", "TRUE", "FEATURE_RUST_APPLETS"]:
              text = set_bool(symbol, True)
          config.write_text(text)
          PY
          yes "" | make oldconfig

      - name: Build BusyBox with Rust applets
        run: make busybox

      - name: Smoke test Rust applet path
        run: ./busybox true
